<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagina non trovata | Tornei ICE</title>

<meta name="robots" content="noindex">

<style>

/* =========================
   DESIGN SYSTEM 2.0
========================= */

:root {

  --bg-main: #f5efe6;
  --bg-secondary: #efe6d8;

  --surface-card: #ffffff;

  --text-main: #2f2a24;
  --text-muted: #6b6258;

  --brand: #b08a5a;
  --brand-hover: #9a764a;

  --border: #e6ded3;

}

body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: var(--bg-main);
  color: var(--text-main);

  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* =========================
   CARD
========================= */

.error-wrapper{
  text-align:center;
  max-width:480px;
  padding:32px;
}

.error-card{

  background:var(--surface-card);
  border:1px solid var(--border);
  border-radius:14px;

  padding:40px 32px;

  box-shadow:0 8px 22px rgba(0,0,0,0.05);

}

/* =========================
   ICON
========================= */

.error-icon{
  font-size:48px;
  margin-bottom:16px;
}

/* =========================
   TITLES
========================= */

.error-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:10px;
}

.error-text{
  color:var(--text-muted);
  font-size:15px;
  line-height:1.5;
  margin-bottom:28px;
}

/* =========================
   BUTTONS
========================= */

.error-actions{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{

  display:inline-block;

  padding:12px 16px;

  border-radius:8px;
  text-decoration:none;

  font-size:14px;
  font-weight:600;

  border:1px solid var(--border);

  transition:all .2s ease;

}

.btn-primary{

  background:var(--brand);
  color:white;
  border:none;

}

.btn-primary:hover{

  background:var(--brand-hover);

}

.btn-secondary{

  background:white;
  color:var(--text-main);

}

.btn-secondary:hover{

  background:var(--bg-secondary);

}

</style>

</head>

<body>

<div class="error-wrapper">

<div class="error-card">

<div class="error-icon">🏟️</div>

<div class="error-title">
Pagina non trovata
</div>

<div class="error-text">
La pagina che stai cercando non esiste oppure è stata spostata.
</div>

<div class="error-actions">

<a href="/" class="btn btn-primary">
Vai alla homepage
</a>

<a href="/classifica" class="btn btn-secondary">
Vai alle classifiche
</a>

<a href="/regolamento" class="btn btn-secondary">
Vai ai regolamenti
</a>

</div>

</div>

</div>

<script>

/* =========================
   REDIRECT INTELLIGENTI
========================= */

const path = window.location.pathname.toLowerCase();

if (path.includes("standings")) {
  window.location.replace("/classifica");
}

if (path.includes("tournament")) {
  window.location.replace("/regolamento");
}

</script>

</body>
</html>
